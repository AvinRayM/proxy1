<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Docs</title>
    <style>
        :root { --bg: #030303; --panel: #0d0d0d; --accent: #00ffcc; --text: #f0f0f0; }
        body { margin:0; padding:0; background:#fff; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; height: 100vh; }
        
        /* DECOY SCREEN */
        #decoy { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #4285f4; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* OS UI */
        #os-ui { display:none; flex-direction: column; height: 100vh; background: var(--bg); color: var(--text); }
        .top-nav { height: 60px; background: var(--panel); display: flex; align-items: center; padding: 0 25px; border-bottom: 1px solid #1a1a1a; gap: 20px; }
        .address-bar { flex-grow: 1; background: #000; border: 1px solid #333; border-radius: 8px; display: flex; align-items: center; padding: 0 15px; }
        #url-input { background: transparent; border: none; color: var(--accent); width: 100%; padding: 10px 0; outline: none; font-family: monospace; font-size: 14px; }
        .btn { background: var(--accent); color: #000; border: none; padding: 8px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { box-shadow: 0 0 15px var(--accent); }

        #viewport { flex-grow: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .taskbar { height: 40px; background: #000; display: flex; align-items: center; padding: 0 20px; border-top: 1px solid #1a1a1a; font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <div id="decoy" onclick="executeJump()">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: #5f6368;">Connecting to Google Drive...</p>
    </div>

    <div id="os-ui">
        <div class="top-nav">
            <div style="font-weight: 900; color: var(--accent); letter-spacing: 1px;">VOID_OS</div>
            <div class="address-bar">
                <input type="text" id="url-input" placeholder="ENTER_ENCRYPTED_TARGET_URL_OR_QUERY">
            </div>
            <button class="btn" onclick="launch()">SEARCH</button>
        </div>
        <div id="viewport">
            <iframe id="main-frame" src="about:blank"></iframe>
        </div>
        <div class="taskbar">
            <span>SYSTEM_STATUS: <span style="color:var(--accent)">STEALTH_ENCRYPTION_ACTIVE</span></span>
            <span style="margin-left:auto;">v4.6_RENDER_HOSTED</span>
        </div>
    </div>

    <script>
        const config = { engine: 'https://duckduckgo.com/html/?q=' };

        function executeJump() {
            let win = window.open('about:blank', '_blank');
            if (win) {
                win.document.title = "Google Docs";
                win.document.body.style.margin = '0';
                win.document.body.style.height = '100vh';
                let f = win.document.createElement('iframe');
                f.style.width = '100vw'; f.style.height = '100vh'; f.style.border = 'none';
                f.src = window.location.href + "?mode=os"; 
                win.document.body.appendChild(f);
                window.location.replace("https://classroom.google.com");
            }
        }

        const params = new URLSearchParams(window.location.search);
        if (params.get('mode') === 'os') {
            document.getElementById('decoy').style.display = 'none';
            document.getElementById('os-ui').style.display = 'flex';
        }

        function launch() {
            let input = document.getElementById('url-input').value.trim();
            if (!input) return;
            
            let target;
            if (input.includes('.') && !input.includes(' ')) {
                target = input.startsWith('http') ? input : 'https://'+input;
            } else {
                target = config.engine + encodeURIComponent(input);
            }
            
            // Base64 encode the URL before sending to proxy
            const b64 = btoa(target);
            document.getElementById('main-frame').src = '/proxy?url=' + b64;
        }

        document.getElementById('url-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') launch(); });
    </script>
</body>
</html>
