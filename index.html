<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Velvet Void OS</title>
    <style>
        :root { --bg: #050505; --panel: #111; --accent: #bb86fc; --text: #eee; }
        body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .nav-bar { padding: 12px 20px; background: var(--panel); display: flex; gap: 10px; border-bottom: 1px solid #222; align-items: center; }
        #url-input { flex-grow: 1; background: #000; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 6px; outline: none; }
        .search-btn { background: var(--accent); color: #000; border: none; padding: 10px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #viewport { flex-grow: 1; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        #taskbar { height: 40px; background: #000; display: flex; align-items: center; padding: 0 20px; border-top: 1px solid #222; }
        .task-link { margin-right: 15px; font-size: 12px; cursor: pointer; color: #555; }
        #settings { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: #1a1a1a; padding: 25px; border: 1px solid var(--accent); display: none; z-index: 1000; }
        select, .save-btn { width: 100%; padding: 10px; margin-top: 10px; background: #000; color: #fff; border: 1px solid #333; }
        .save-btn { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <input type="text" id="url-input" placeholder="Search the void...">
        <button class="search-btn" onclick="launch()">SEARCH</button>
    </div>
    <div id="viewport">
        <iframe id="main-frame" src="about:blank"></iframe>
    </div>
    <div id="taskbar">
        <span class="task-link" onclick="document.getElementById('settings').style.display='block'">Settings</span>
        <span class="task-link" onclick="location.reload()">Refresh</span>
    </div>
    <div id="settings">
        <h3 style="margin:0; color:var(--accent);">Settings</h3>
        <select id="engine-select">
            <option value="https://duckduckgo.com/html/?q=">DuckDuckGo (Safe Mode)</option>
            <option value="https://www.bing.com/search?q=">Bing</option>
            <option value="https://www.google.com/search?q=">Google</option>
        </select>
        <div style="margin-top:10px; display:flex; justify-content:space-between;">
            <span>Cloak</span>
            <input type="checkbox" id="cloak">
        </div>
        <button class="save-btn" onclick="save()">SAVE</button>
    </div>
    <script>
        let config = JSON.parse(localStorage.getItem('vv_config')) || { engine: 'https://duckduckgo.com/html/?q=', cloak: false };
        function save() {
            config.engine = document.getElementById('engine-select').value;
            config.cloak = document.getElementById('cloak').checked;
            localStorage.setItem('vv_config', JSON.stringify(config));
            document.getElementById('settings').style.display='none';
            if(config.cloak) {
                let win = window.open('about:blank','_blank');
                win.document.body.style.margin='0';
                let f = win.document.createElement('iframe');
                f.style.width='100vw';f.style.height='100vh';f.style.border='none';f.src=window.location.href;
                win.document.body.appendChild(f);
                window.location.replace("https://classroom.google.com");
            }
        }
        function launch() {
            let input = document.getElementById('url-input').value.trim();
            if(!input) return;
            let target = (input.includes('.') && !input.includes(' ')) ? (input.startsWith('http') ? input : 'https://'+input) : (config.engine + encodeURIComponent(input));
            document.getElementById('main-frame').src = '/proxy?url=' + encodeURIComponent(target);
        }
        document.getElementById('engine-select').value = config.engine;
    </script>
</body>
</html>
