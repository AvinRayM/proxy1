<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Velvet Void OS</title>
    <style>
        :root { --bg: #080808; --panel: #121212; --accent: #bb86fc; --text: #f5f5f5; }
        body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navigation */
        .nav-bar { padding: 12px 20px; background: var(--panel); display: flex; gap: 10px; border-bottom: 1px solid #222; align-items: center; }
        #url-input { flex-grow: 1; background: #000; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 6px; outline: none; font-size: 14px; }
        #url-input:focus { border-color: var(--accent); }
        .search-btn { background: var(--accent); color: #000; border: none; padding: 10px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .search-btn:hover { background: #d7b7fd; transform: translateY(-1px); }

        /* Frame Viewport */
        #viewport { flex-grow: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Taskbar */
        #taskbar { height: 45px; background: #0a0a0a; display: flex; align-items: center; padding: 0 20px; border-top: 1px solid #1a1a1a; }
        .task-link { margin-right: 20px; font-size: 13px; cursor: pointer; color: #777; transition: 0.3s; }
        .task-link:hover { color: var(--accent); }

        /* Settings Modal */
        #settings-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: #181818; padding: 30px; border-radius: 15px; border: 1px solid var(--accent); display: none; z-index: 1000; box-shadow: 0 0 100px rgba(0,0,0,0.9); }
        .settings-title { margin: 0 0 20px 0; color: var(--accent); font-weight: bold; font-size: 1.2rem; }
        select, .save-btn { width: 100%; padding: 10px; margin-top: 10px; background: #000; color: #fff; border: 1px solid #333; border-radius: 4px; }
        .save-btn { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <input type="text" id="url-input" placeholder="Search the void or enter a direct URL...">
        <button class="search-btn" onclick="launch()">SEARCH</button>
    </div>

    <div id="viewport">
        <iframe id="main-frame" src="about:blank"></iframe>
    </div>
    
    <div id="taskbar">
        <span class="task-link" onclick="toggleSettings()">OS Settings</span>
        <span class="task-link" onclick="location.reload()">Reboot</span>
        <div style="margin-left:auto; font-size:11px; color:#444;">VELVET_VOID_V4.6 | CLOUD_MODE</div>
    </div>

    <div id="settings-overlay">
        <div class="settings-title">System Settings</div>
        <label style="font-size: 12px; color: #888;">Preferred Search Engine</label>
        <select id="engine-select">
            <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
            <option value="https://www.google.com/search?q=">Google</option>
            <option value="https://www.brave.com/search?q=">Brave</option>
            <option value="https://www.bing.com/search?q=">Bing</option>
        </select>
        <div style="margin-top:20px; display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size: 13px;">about:blank Cloaking</span>
            <input type="checkbox" id="cloak-toggle">
        </div>
        <button class="save-btn" onclick="saveSettings()">SAVE & APPLY</button>
    </div>

    <script>
        // Load persistency
        let config = JSON.parse(localStorage.getItem('vv_config')) || { engine: 'https://duckduckgo.com/?q=', cloak: false };

        function toggleSettings() {
            const el = document.getElementById('settings-overlay');
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            config.engine = document.getElementById('engine-choice' ? 'engine-choice' : 'engine-select').value;
            config.cloak = document.getElementById('cloak-toggle').checked;
            localStorage.setItem('vv_config', JSON.stringify(config));
            
            if (config.cloak) {
                let win = window.open('about:blank', '_blank');
                if (win) {
                    win.document.body.style.margin = '0';
                    let f = win.document.createElement('iframe');
                    f.style.width='100vw'; f.style.height='100vh'; f.style.border='none';
                    f.src = window.location.href;
                    win.document.body.appendChild(f);
                    window.location.replace("https://classroom.google.com");
                }
            }
            toggleSettings();
        }

        function launch() {
            const input = document.getElementById('url-input').value.trim();
            if (!input) return;
            
            let target;
            if (input.includes('.') && !input.includes(' ')) {
                target = input.startsWith('http') ? input : 'https://' + input;
            } else {
                target = config.engine + encodeURIComponent(input);
            }
            
            // Relative path ensures it works on Render's URL
            document.getElementById('main-frame').src = '/proxy?url=' + encodeURIComponent(target);
        }

        // Init
        document.getElementById('engine-select').value = config.engine;
        document.getElementById('cloak-toggle').checked = config.cloak;
    </script>
</body>
</html>
